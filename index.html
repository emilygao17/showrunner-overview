<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Showrunner Monthly Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,700;0,14..32,900;1,14..32,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #EEF0F4;
    --surface: #fff;
    --ink: #0A0A0A;
    --muted: #666;
    --border: #D8DAE0;
    --accent: #0A0A0A;
    --green: #1A6B3C;
    --red: #C0392B;
    --label: #E53E2C;
    --radius: 12px;
    --gap: 16px;
  }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--ink);
    color: #fff;
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    height: 32px;
    width: auto;
    display: block;
    filter: invert(1) brightness(2);
  }

  .month-nav {
    display: flex;
    gap: 4px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .month-nav::-webkit-scrollbar { display: none; }

  .month-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.25);
    color: rgba(255,255,255,0.6);
    padding: 5px 12px;
    border-radius: 20px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .month-btn:hover { border-color: rgba(255,255,255,0.6); color: #fff; }
  .month-btn.active {
    background: #fff;
    border-color: #fff;
    color: var(--ink);
    font-weight: 700;
  }

  /* ── Layout ── */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 20px 48px;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: var(--gap);
  }

  .card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 20px;
    min-width: 0;
    border: 1px solid var(--border);
  }

  .card-full  { grid-column: 1 / -1; }
  .card-half  { grid-column: span 3; }
  .card-third { grid-column: span 2; }

  .card-label {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--label);
    margin-bottom: 12px;
  }

  /* Red bold sans for sub-labels */
  .crawl-based-on {
    color: var(--label);
    font-weight: 800;
    letter-spacing: 0.12em;
  }

  /* ── Stats hero ── */
  .stats-hero { grid-column: 1 / -1; }
  .stats-hero .month-title {
    font-size: 32px;
    font-weight: 900;
    font-stretch: condensed;
    letter-spacing: -0.01em;
    line-height: 1;
    margin-bottom: 16px;
  }
  .stats-row {
    display: flex;
    gap: 32px;
  }
  .stat-num {
    font-size: 26px;
    font-weight: 900;
    font-stretch: condensed;
    line-height: 1;
  }
  .stat-item .stat-lbl {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* ── Show of the month ── */
  .sotm-image {
    display: block;
    width: 300px;
    height: 225px;
    object-fit: cover;
    border-radius: 8px;
    margin: 0 auto 14px;
    background: var(--bg);
  }
  .sotm-title {
    font-size: 20px;
    font-weight: 800;
    line-height: 1.2;
    margin-bottom: 4px;
  }
  .sotm-venue {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .sotm-desc {
    font-size: 13px;
    color: #333;
    line-height: 1.55;
    margin-bottom: 12px;
  }
  .tag-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 12px;
  }
  .tag {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 500;
    color: var(--ink);
  }
  .sotm-meta {
    display: flex;
    gap: 16px;
    font-size: 12px;
    color: var(--muted);
  }
  .sotm-meta strong { color: var(--ink); }
  .sotm-footnote {
    font-size: 11px;
    font-style: italic;
    color: var(--muted);
    margin-top: auto;
    padding-top: 8px;
  }
  /* SOTM wrappers — magazine mode defaults */
  .sotm-img-wrap { display: block; }
  .sotm-logo { display: none; }
  .sotm-body { display: block; }

  /* ── Top 5 ── */
  .show-list {
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .show-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .show-row:last-child { border-bottom: none; }
  .show-rank {
    font-size: 20px;
    font-weight: 900;
    font-stretch: condensed;
    color: var(--border);
    width: 24px;
    text-align: center;
    flex-shrink: 0;
  }
  .show-thumb {
    width: 52px;
    height: 52px;
    border-radius: 6px;
    object-fit: cover;
    background: var(--bg);
    flex-shrink: 0;
  }
  .show-info { flex: 1; min-width: 0; }
  .show-title {
    font-weight: 700;
    font-size: 13px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .show-venue {
    font-size: 12px;
    color: var(--muted);
    margin-top: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .show-medium {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .show-count {
    font-size: 18px;
    font-weight: 800;
    font-stretch: condensed;
    flex-shrink: 0;
    text-align: right;
  }
  .show-count-lbl {
    font-size: 10px;
    color: var(--muted);
    text-align: right;
  }

  /* ── Neighborhoods ── */
  .hood-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .hood-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .hood-name {
    font-size: 13px;
    font-weight: 500;
    width: 130px;
    flex-shrink: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .hood-bar-wrap {
    flex: 1;
    background: var(--bg);
    border-radius: 4px;
    height: 8px;
    overflow: hidden;
  }
  .hood-bar {
    height: 100%;
    background: var(--ink);
    border-radius: 4px;
    transition: width 0.4s ease;
  }
  .hood-count {
    font-size: 12px;
    font-weight: 700;
    width: 28px;
    text-align: right;
    flex-shrink: 0;
  }

  /* ── Gallery Crawl ── */
  .crawl-intro {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 16px;
  }
  .crawl-group {
    padding-bottom: 14px;
    margin-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .crawl-group:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .crawl-based-on {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .crawl-show-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
  }
  .crawl-show-row:last-child { border-bottom: none; }
  .crawl-thumb {
    width: 44px;
    height: 44px;
    border-radius: 6px;
    flex-shrink: 0;
    object-fit: cover;
    background: #F1EFE8;
    display: block;
  }
  .crawl-show-info {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .crawl-show-title {
    font-size: 12px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    min-width: 0;
  }
  .crawl-show-meta {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    flex-shrink: 0;
    text-align: right;
  }

  /* ── Returning favorites ── */
  .returning-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .returning-item {
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .returning-item:last-child { border-bottom: none; padding-bottom: 0; }
  .returning-title { font-weight: 700; font-size: 13px; }
  .returning-venue { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .returning-months {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .returning-month-tag {
    font-size: 10px;
    font-weight: 600;
    background: #f0f4f8;
    padding: 2px 8px;
    border-radius: 10px;
    color: var(--ink);
  }
  .empty-state {
    color: var(--muted);
    font-size: 13px;
    font-style: italic;
    padding: 8px 0;
  }

  /* ── Map ── */
  .week-nav {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
  }
  .week-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 4px 14px;
    border-radius: 20px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .week-btn:hover { border-color: var(--ink); color: var(--ink); }
  .week-btn.active { background: var(--ink); border-color: var(--ink); color: #fff; font-weight: 700; }

  .maplibregl-popup-close-button {
    font-size: 16px;
    color: #666;
    padding: 2px 6px;
    line-height: 1;
  }
  .maplibregl-popup-close-button:hover { color: #0A0A0A; }
  .maplibregl-popup-content { padding: 10px 28px 10px 10px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.15); }

  #map-container {
    height: 380px;
    border-radius: 8px;
    overflow: hidden;
    margin-top: 4px;
  }

  /* ── Closing this month ── */
  .closing-list {
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .closing-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .closing-row:last-child { border-bottom: none; }
  .closing-date {
    font-size: 11px;
    font-weight: 700;
    color: var(--red);
    width: 56px;
    flex-shrink: 0;
  }
  .closing-info { flex: 1; min-width: 0; }
  .closing-title {
    font-weight: 700;
    font-size: 13px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .closing-venue { font-size: 12px; color: var(--muted); }
  .closing-seen {
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
    color: var(--muted);
  }

  /* ── Loading / error ── */
  #loading {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px;
    color: var(--muted);
    font-size: 16px;
  }

  /* ── View toggle button ── */
  .view-toggle {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.35);
    color: rgba(255,255,255,0.7);
    padding: 5px 14px;
    border-radius: 20px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: all 0.15s;
    margin-left: 8px;
  }
  .view-toggle:hover { border-color: #fff; color: #fff; }
  .view-toggle.active { background: #fff; border-color: #fff; color: var(--ink); }

  /* ── Story Mode ── */
  :root { --sq: min(calc(100vh - 96px), calc(100vw - 40px), 700px); }

  body.story-mode main {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    padding: 20px;
    max-width: 100%;
  }

  body.story-mode .card,
  body.story-mode .card-full,
  body.story-mode .card-half,
  body.story-mode .card-third {
    width: var(--sq);
    height: var(--sq);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    padding: 36px;
    flex-shrink: 0;
    position: relative;
    border: none;
  }
  body.story-mode .card:not(.stats-hero)::before {
    content: var(--story-month-label, '');
    position: absolute;
    top: 22px;
    right: 24px;
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.02em;
    pointer-events: none;
  }

  /* Card label stays, reduce bottom margin */
  body.story-mode .card-label { font-size: 16px; letter-spacing: 0.08em; margin-bottom: 14px; flex-shrink: 0; }
  .top5-views-subtitle, .top5-seen-subtitle, .top5-saved-subtitle { display: none; }
  body.story-mode .top5-views-subtitle,
  body.story-mode .top5-seen-subtitle,
  body.story-mode .top5-saved-subtitle {
    display: block;
    font-size: 11px;
    font-style: italic;
    color: var(--muted);
    margin-top: -10px;
    margin-bottom: 12px;
    flex-shrink: 0;
  }

  /* Stats hero — cover slide */
  body.story-mode .stats-hero { padding: 0; position: relative; }
  body.story-mode .stats-magazine { display: none; }
  body.story-mode .stats-cover { display: flex; }

  /* Cover slide base (hidden in magazine mode) */
  .stats-cover { display: none; }
  .stats-cover {
    flex: 1;
    width: 100%;
    position: relative;
    overflow: hidden;
    background: #fff;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding-bottom: 290px;
  }
  /* Bottom image strip */
  .cover-img-row {
    position: absolute;
    bottom: 50px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    gap: 5px;
    align-items: stretch;
    overflow: visible;
  }
  .cover-img-row img {
    height: 220px;
    width: auto;
    display: block;
    flex-shrink: 0;
    object-fit: cover;
  }
  /* Center content */
  .cover-content {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px 60px;
    gap: 12px;
    color: #111;
  }
  .cover-logo {
    height: 64px;
    width: auto;
    display: block;
    margin-bottom: 8px;
  }
  .cover-title {
    font-size: 40px;
    font-weight: 300;
    font-stretch: condensed;
    line-height: 1;
    letter-spacing: -0.01em;
    white-space: nowrap;
    color: #111;
  }
  .cover-stat {
    font-size: 18px;
    font-weight: 500;
    color: var(--label);
    letter-spacing: 0.01em;
    line-height: 1.3;
  }

  /* SOTM — story mode */
  body.story-mode .sotm-card { padding: 32px 36px 28px; }
  body.story-mode .sotm-logo {
    display: block;
    width: 180px;
    height: auto;
    flex-shrink: 0;
    margin-bottom: 8px;
  }
  body.story-mode .sotm-img-wrap {
    width: 100%;
    flex: 0 0 34%;
    overflow: hidden;
    border-radius: 8px;
  }
  body.story-mode .sotm-img-wrap .sotm-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    border-radius: 0;
    margin: 0;
  }
  body.story-mode .sotm-body {
    flex: 1;
    padding-top: 6px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    justify-content: flex-start;
    overflow: hidden;
    min-height: 0;
  }
  body.story-mode .sotm-body .card-label {
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.1em;
  }
  body.story-mode .sotm-title { font-size: 22px; font-weight: 800; line-height: 1.1; }
  body.story-mode .sotm-venue { font-size: 13px; }
  body.story-mode .sotm-desc {
    font-size: 14px;
    line-height: 1.45;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  body.story-mode .tag { font-size: 13px; padding: 4px 11px; }
  body.story-mode .tag-row { gap: 5px; }

  /* Shared story logo (all non-SOTM cards) */
  .story-logo { display: none; }
  body.story-mode .story-logo {
    display: block;
    width: 144px;
    height: auto;
    flex-shrink: 0;
    margin-bottom: 10px;
  }

  /* Top 5 / Most Popular lists */
  body.story-mode .show-list {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }
  body.story-mode .show-row { flex: 1; padding: 0; gap: 14px; align-items: center; }
  body.story-mode .show-thumb { width: 60px; height: 60px; border-radius: 6px; flex-shrink: 0; }
  body.story-mode .show-rank { font-size: 22px; width: 26px; }
  body.story-mode .show-title { font-size: 15px; font-weight: 700; }
  body.story-mode .show-venue { font-size: 13px; }
  body.story-mode .show-medium { font-size: 12px; }
  body.story-mode .show-count { font-size: 22px; }
  body.story-mode .show-count-lbl { font-size: 11px; }

  /* Map */
  body.story-mode #map-container { flex: 1; height: auto; min-height: 0; border-radius: 6px; margin-top: 4px; }
  body.story-mode .week-nav { display: none; }

  /* Neighborhoods */
  body.story-mode .hood-list {
    display: flex;
    flex-direction: column;
    gap: 22px;
    margin-top: auto;
    margin-bottom: auto;
    transform: translateY(-20px);
  }
  body.story-mode .hood-name { font-size: 15px; font-weight: 700; width: 150px; }
  body.story-mode .hood-bar-wrap { height: 12px; }
  body.story-mode .hood-count { font-size: 15px; font-weight: 700; width: 32px; }

  /* Gallery Crawl */
  body.story-mode .crawl-intro { font-size: 13px; margin-bottom: 12px; flex-shrink: 0; }
  body.story-mode .crawl-pairs {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
    gap: 16px;
    justify-content: flex-start;
  }
  body.story-mode .crawl-show-title { font-size: 13px; font-weight: 700; }
  body.story-mode .crawl-show-meta { font-size: 12px; text-align: right; }
  body.story-mode .crawl-based-on { font-size: 11px; margin-bottom: 4px; }
  body.story-mode .crawl-group { padding-bottom: 0; margin-bottom: 0; border-bottom: none; }
  body.story-mode .crawl-show-row { padding: 4px 0; gap: 10px; }
  body.story-mode .crawl-thumb { width: 34px; height: 34px; border-radius: 5px; }

  /* Closing – story mode hides both closing cards */
  body.story-mode .card-closing-this { display: none !important; }
  body.story-mode .card-closing-next { display: none !important; }

  /* Closing */
  body.story-mode .closing-list {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }
  body.story-mode .closing-row { flex: 1; padding: 0; gap: 10px; align-items: center; }
  body.story-mode .closing-title { font-size: 15px; font-weight: 700; }
  body.story-mode .closing-venue { font-size: 12px; }
  body.story-mode .closing-date { font-size: 13px; font-weight: 700; width: 52px; }
  body.story-mode .closing-seen { font-size: 15px; font-weight: 700; }

  /* Returning Favorites */
  body.story-mode .returning-list {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }
  body.story-mode .returning-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-bottom: 0;
    border-bottom: 1px solid var(--border);
  }
  body.story-mode .returning-item:last-child { border-bottom: none; }
  body.story-mode .returning-title { font-size: 16px; font-weight: 700; }
  body.story-mode .returning-venue { font-size: 13px; margin-bottom: 4px; }
  body.story-mode .returning-month-tag { font-size: 12px; padding: 3px 10px; }

  /* Table view cards (story-only) */
  .card-table-view { display: none !important; }
  body.story-mode .card-table-view { display: flex !important; flex-direction: column; }
  .table-card-subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 14px;
    flex-shrink: 0;
  }
  .table-view {
    width: 100%;
    border-collapse: collapse;
    flex: 1;
  }
  .table-view thead th {
    font-size: 10px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 0 0 8px;
    border-bottom: 2px solid var(--ink);
    color: var(--ink);
    text-align: left;
  }
  .table-view thead th:not(:first-child) { text-align: right; }
  .table-view tbody td {
    font-size: 16px;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
    color: var(--ink);
    text-align: left;
  }
  .table-view tbody td:not(:first-child) { text-align: right; }
  .table-intensity-label {
    display: block;
    font-size: 9px;
    font-weight: 400;
    color: var(--label);
    margin-top: 1px;
  }
  .table-intensity-value {
    font-weight: 700;
    color: var(--label);
  }
  .table-top-score {
    font-weight: 700;
    color: #c0392b;
  }
  .table-top-label {
    font-size: 10px;
    color: #c0392b;
    margin-right: 6px;
  }
  .table-footnote {
    font-size: 11px;
    font-style: italic;
    color: var(--label);
    margin-top: 10px;
    line-height: 1.5;
  }

  /* ── Mobile ── */
  @media (max-width: 680px) {
    main {
      grid-template-columns: 1fr;
      padding: 16px 12px 48px;
    }
    .card-full, .card-half, .card-third { grid-column: 1 / -1; }
    header { padding: 0 16px; }
    .month-nav { max-width: calc(100vw - 140px); }
    .stats-hero .month-title { font-size: 24px; }
    .stat-num { font-size: 22px; }
  }
  /* ── On-View Pie Charts card ── */
  .card-onview { display: none !important; }
  body.story-mode .card-onview { display: flex !important; flex-direction: column; }

  /* Snapshot — "by the numbers" card (story mode only) */
  .card-snapshot { display: none !important; }
  body.story-mode .card-snapshot { display: flex !important; flex-direction: column; }
  body.story-mode .snapshot-grid {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-content: center;
    min-height: 0;
  }
  body.story-mode .snapshot-stat {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 22px 0;
  }
  body.story-mode .snapshot-stat:nth-child(odd) {
    padding-right: 36px;
    border-right: 1px solid rgba(0,0,0,0.08);
  }
  body.story-mode .snapshot-stat:nth-child(even) {
    padding-left: 36px;
  }
  body.story-mode .snapshot-stat:not(:nth-last-child(-n+2)) {
    border-bottom: 1px solid rgba(0,0,0,0.08);
  }
  body.story-mode .snapshot-num {
    font-size: 54px;
    font-weight: 800;
    line-height: 1;
    color: var(--ink);
    letter-spacing: -0.02em;
  }
  body.story-mode .snapshot-label {
    font-size: 10px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.07em;
    text-transform: uppercase;
    margin-top: 9px;
  }
  /* Two halves stacked vertically */
  .onview-charts { flex: 1; display: flex; flex-direction: column; gap: 10px; min-height: 0; }
  .onview-chart-wrap { flex: 1; display: flex; flex-direction: column; min-width: 0; min-height: 0; }
  .onview-subtitle { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 6px; flex-shrink: 0; text-align: left; }
  /* Bar chart fills remaining height of each half */
  .onview-bar-container { flex: 1; position: relative; min-height: 0; }
  .onview-bar-container canvas { position: absolute; inset: 0; width: 100% !important; height: 100% !important; }
</style>
</head>
<body>

<header>
  <img class="logo" src="logo.PNG" alt="Showrunner">
  <nav class="month-nav" id="month-nav"></nav>
  <button class="view-toggle" id="view-toggle">Story view</button>
</header>

<main id="main">
  <div id="loading">Loading…</div>
</main>

<script>
const MONTHS = [
  { ym: '2025-07', label: 'Jul 2025' },
  { ym: '2025-08', label: 'Aug 2025' },
  { ym: '2025-09', label: 'Sep 2025' },
  { ym: '2025-10', label: 'Oct 2025' },
  { ym: '2025-11', label: 'Nov 2025' },
  { ym: '2025-12', label: 'Dec 2025' },
  { ym: '2026-01', label: 'Jan 2026' },
  { ym: '2026-02', label: 'Feb 2026' },
  { ym: '2026-03', label: 'Mar 2026' },
  { ym: '2026-04', label: 'Apr 2026' },
];

const MONTH_SHORT = {
  '01':'Jan','02':'Feb','03':'Mar','04':'Apr','05':'May','06':'Jun',
  '07':'Jul','08':'Aug','09':'Sep','10':'Oct','11':'Nov','12':'Dec',
};

let currentMap = null;

// ── Month nav ──────────────────────────────────────────────────────────────
const nav = document.getElementById('month-nav');
MONTHS.forEach(({ ym, label }) => {
  const btn = document.createElement('button');
  btn.className = 'month-btn';
  btn.textContent = label;
  btn.dataset.ym = ym;
  btn.addEventListener('click', () => loadMonth(ym));
  nav.appendChild(btn);
});

function setActiveBtn(ym) {
  document.querySelectorAll('.month-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.ym === ym);
  });
}

// ── Helpers ────────────────────────────────────────────────────────────────
function fmtDate(iso) {
  if (!iso) return '';
  const [y, m, d] = iso.split('-');
  return `${MONTH_SHORT[m]} ${parseInt(d)}`;
}

function imgOrPlaceholder(url, cls, alt) {
  if (url) {
    return `<img class="${cls}" src="${url}" alt="${alt}" onerror="this.style.display='none'">`;
  }
  return `<div class="${cls}" style="background:var(--bg);"></div>`;
}

function tagsHtml(arr) {
  if (!arr || !arr.length) return '';
  return `<div class="tag-row">${arr.map(t => `<span class="tag">${t}</span>`).join('')}</div>`;
}

// ── Render helpers ─────────────────────────────────────────────────────────
const MONTH_FULL = {
  '01':'January','02':'February','03':'March','04':'April','05':'May','06':'June',
  '07':'July','08':'August','09':'September','10':'October','11':'November','12':'December',
};

function renderStats(d) {
  // Collect up to 7 images for the bottom strip
  const seenUrls = new Set();
  const coverImgs = [];
  for (const s of [...(d.top_5_views || []), ...(d.top_5_seen || []), ...(d.top_5_saved || [])]) {
    if (coverImgs.length >= 7) break;
    if (s.featured_image && !seenUrls.has(s.featured_image)) {
      seenUrls.add(s.featured_image);
      coverImgs.push(s.featured_image);
    }
  }

  const [yr, mo] = d.month.split('-');
  const coverTitle = `${MONTH_FULL[mo]} ${yr} Roundup`;
  const statLine = `${d.total_checkins.toLocaleString()} visits across NYC`;

  const imgRow = coverImgs
    .map(url => `<img src="${url}" alt="" loading="lazy">`)
    .join('');

  return `
  <div class="card stats-hero">
    <div class="stats-magazine">
      <div class="month-title">${d.label}</div>
      <div class="stats-row">
        <div class="stat-num">${statLine}</div>
      </div>
    </div>
    <div class="stats-cover">
      <div class="cover-content">
        <img class="cover-logo" src="logo.PNG" alt="Showrunner" loading="lazy">
        <div class="cover-title">${coverTitle}</div>
        <div class="cover-stat">${statLine}</div>
      </div>
      <div class="cover-img-row">${imgRow}</div>
    </div>
  </div>`;
}

function renderSnapshot(snapshot, label) {
  if (!snapshot) return '';
  const fmt = n => Number(n).toLocaleString('en-US');
  const stat = (num, lbl) => `
    <div class="snapshot-stat">
      <div class="snapshot-num">${fmt(num)}</div>
      <div class="snapshot-label">${lbl}</div>
    </div>`;
  return `
  <div class="card card-full card-snapshot">
    <img class="story-logo" src="logo.PNG" alt="Showrunner">
    <div class="card-label">${label} — by the numbers</div>
    <div class="snapshot-grid">
      ${stat(snapshot.total_seen, 'show visits by Showrunner users')}
      ${stat(snapshot.shows_opened,      'Shows opened this month')}
      ${stat(snapshot.museum_openings,   'Museum openings')}
      ${stat(snapshot.gallery_openings,  'Gallery openings')}
      ${stat(snapshot.solo_shows,        'Solo shows')}
      ${stat(snapshot.group_shows,       'Group shows')}
    </div>
  </div>`;
}

function renderSotm(show) {
  return `
  <div class="card card-full sotm-card">
    <img class="sotm-logo" src="logo.PNG" alt="Showrunner">
    <div class="sotm-img-wrap">
      ${imgOrPlaceholder(show.featured_image, 'sotm-image', show.title)}
    </div>
    <div class="sotm-body">
      <div class="card-label">Show of the Month</div>
      <div class="sotm-title">${show.title}</div>
      <div class="sotm-venue">${show.venue_name} · ${show.neighborhood}</div>
      ${show.short_description ? `<div class="sotm-desc">${show.short_description}</div>` : ''}
      ${tagsHtml(show.mediums)}
      ${tagsHtml(show.artists)}
      <div class="sotm-footnote">Show of the month determined by Showrunner user impressions.</div>
    </div>
  </div>`;
}

function renderTop5(shows) {
  const rows = shows.map((s, i) => `
    <div class="show-row">
      <div class="show-rank">${i + 1}</div>
      ${imgOrPlaceholder(s.featured_image, 'show-thumb', s.title)}
      <div class="show-info">
        <div class="show-title">${s.title}</div>
        <div class="show-venue">${s.venue_name} · ${s.neighborhood}</div>
        ${s.mediums && s.mediums.length ? `<div class="show-medium">${s.mediums.join(', ')}</div>` : ''}
      </div>
    </div>`).join('');
  return `
  <div class="card card-half">
    <img class="story-logo" src="logo.PNG" alt="Showrunner">
    <div class="card-label">Top 5 Most Visited</div>
    <div class="top5-seen-subtitle">Ranked by Showrunner user's seen shows</div>
    <div class="show-list">${rows}</div>
  </div>`;
}

function renderTop5Saved(shows) {
  if (!shows || !shows.length) return `
  <div class="card card-half">
    <div class="card-label">Top 5 Want to See</div>
    <div class="empty-state">No saves recorded this month.</div>
  </div>`;
  const rows = shows.map((s, i) => `
    <div class="show-row">
      <div class="show-rank">${i + 1}</div>
      ${imgOrPlaceholder(s.featured_image, 'show-thumb', s.title)}
      <div class="show-info">
        <div class="show-title">${s.title}</div>
        <div class="show-venue">${s.venue_name} · ${s.neighborhood}</div>
        ${s.mediums && s.mediums.length ? `<div class="show-medium">${s.mediums.join(', ')}</div>` : ''}
      </div>
    </div>`).join('');
  return `
  <div class="card card-half">
    <img class="story-logo" src="logo.PNG" alt="Showrunner">
    <div class="card-label">Top 5 Want to See</div>
    <div class="top5-saved-subtitle">Ranked by Showrunner user's lists</div>
    <div class="show-list">${rows}</div>
  </div>`;
}

function renderTop5Views(shows) {
  if (!shows || !shows.length) return `
  <div class="card card-full">
    <div class="card-label">Most Popular Shows This Month</div>
    <div class="empty-state">No view data this month.</div>
  </div>`;
  const rows = shows.map((s, i) => `
    <div class="show-row">
      <div class="show-rank">${i + 1}</div>
      ${imgOrPlaceholder(s.featured_image, 'show-thumb', s.title)}
      <div class="show-info">
        <div class="show-title">${s.title}</div>
        <div class="show-venue">${s.venue_name} · ${s.neighborhood}</div>
        ${s.mediums && s.mediums.length ? `<div class="show-medium">${s.mediums.join(', ')}</div>` : ''}
      </div>
    </div>`).join('');
  return `
  <div class="card card-full">
    <img class="story-logo" src="logo.PNG" alt="Showrunner">
    <div class="card-label">Most Popular Shows This Month</div>
    <div class="top5-views-subtitle">Ranked by Showrunner App user impressions</div>
    <div class="show-list">${rows}</div>
  </div>`;
}

function renderNeighborhoods(hoods) {
  if (!hoods.length) return '';
  const max = hoods[0].checkin_count;
  const rows = hoods.map(h => `
    <div class="hood-row">
      <div class="hood-name">${h.neighborhood}</div>
      <div class="hood-bar-wrap">
        <div class="hood-bar" style="width:${Math.round(h.checkin_count / max * 100)}%"></div>
      </div>
      <div class="hood-count">${h.checkin_count} <span style="font-weight:400;font-size:0.8em;color:var(--muted)">visits</span></div>
    </div>`).join('');
  return `
  <div class="card card-half">
    <img class="story-logo" src="logo.PNG" alt="Showrunner">
    <div class="card-label">Neighborhoods</div>
    <div class="hood-list">${rows}</div>
  </div>`;
}

function renderGalleryCrawl(crawls) {
  if (!crawls || !crawls.length) return `
  <div class="card card-half">
    <div class="card-label">The Gallery Crawl</div>
    <div class="empty-state">Not enough list data.</div>
  </div>`;
  const groups = crawls.map(c => {
    const rows = c.shows.map(s => {
      const thumb = s.featured_image
        ? `<img class="crawl-thumb" src="${s.featured_image}" alt="" loading="lazy">`
        : `<div class="crawl-thumb"></div>`;
      return `
      <div class="crawl-show-row">
        ${thumb}
        <div class="crawl-show-info">
          <div class="crawl-show-title">${s.title}</div>
          <div class="crawl-show-meta">${s.venue_name} · ${s.neighborhood}</div>
        </div>
      </div>`;
    }).join('');
    return `
    <div class="crawl-group">
      <div class="crawl-based-on">Based on ${c.list_count} lists</div>
      ${rows}
    </div>`;
  }).join('');

  return `
  <div class="card card-half">
    <img class="story-logo" src="logo.PNG" alt="Showrunner">
    <div class="card-label">The Gallery Crawl</div>
    <div class="crawl-intro">Shows people keep planning together.</div>
    <div class="crawl-pairs">${groups}</div>
  </div>`;
}

function renderReturning(favorites) {
  const inner = !favorites.length
    ? `<div class="empty-state">No returning favorites this month.</div>`
    : favorites.map(f => `
      <div class="returning-item">
        <div class="returning-title">${f.title}</div>
        <div class="returning-venue">${f.venue_name} · ${f.neighborhood} · ${f.seen_this_month} check-ins</div>
        <div class="returning-months">
          ${f.also_top5_in.map(m => {
            const [y, mo] = m.split('-');
            return `<span class="returning-month-tag">${MONTH_SHORT[mo]} ${y}</span>`;
          }).join('')}
        </div>
      </div>`).join('');
  return `
  <div class="card">
    <img class="story-logo" src="logo.PNG" alt="Showrunner">
    <div class="card-label">Returning Favorites</div>
    <div class="returning-list">${inner}</div>
  </div>`;
}

function renderMap() {
  return `
  <div class="card card-full">
    <img class="story-logo" src="logo.PNG" alt="Showrunner">
    <div class="card-label">Check-in Map</div>
    <div class="week-nav" id="week-nav">
      <button class="week-btn active" data-week="0">Week 1</button>
      <button class="week-btn" data-week="1">Week 2</button>
      <button class="week-btn" data-week="2">Week 3</button>
      <button class="week-btn" data-week="3">Week 4</button>
    </div>
    <div id="map-container"></div>
  </div>`;
}

function renderTableCard(stats, label, firstColHeader) {
  if (!stats || !stats.length) return '';
  const sorted = [...stats].sort((a, b) => b.views_per_show - a.views_per_show);
  const rows = sorted.map((item, i) => {
    const isTop = i === 0;
    const scoreCell = isTop
      ? `<td><span class="table-top-label">← highest interest</span><span class="table-top-score">${item.views_per_show}</span></td>`
      : `<td>${item.views_per_show}</td>`;
    return `
    <tr>
      <td>${item.label}</td>
      ${scoreCell}
    </tr>`;
  }).join('');
  return `
  <div class="card card-full card-table-view">
    <img class="story-logo" src="logo.PNG" alt="Showrunner">
    <div class="card-label">${label}</div>
    <table class="table-view">
      <thead>
        <tr>
          <th>${firstColHeader}</th><th>User Interest Score</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
    <p class="table-footnote">User interest score reflects how engaged viewers are per show — calculated as average impressions per show in this category. A higher score means each show in this category captured more attention on average.</p>
  </div>`;
}

function renderMediums(stats, month) {
  return renderTableCard(stats, 'Most Popular Mediums', 'Medium');
}

function renderSubjectMatters(stats, month) {
  return renderTableCard(stats, 'Most Popular Subject Matters', 'Subject matter');
}

// ── On-View Bar Charts ──────────────────────────────────────────────────────

const BAR_COLOR   = '#8db4cc';
const OTHER_COLOR = '#C8C4BC';

let _onViewCharts = [];

function renderOnView(onViewStats, label) {
  if (!onViewStats) return '';
  return `
  <div class="card card-full card-onview">
    <img class="story-logo" src="logo.PNG" alt="Showrunner">
    <div class="card-label">${label} — what's on view</div>
    <div class="onview-charts">
      <div class="onview-chart-wrap">
        <div class="onview-subtitle">By medium</div>
        <div class="onview-bar-container"><canvas id="bar-medium"></canvas></div>
      </div>
      <div class="onview-chart-wrap">
        <div class="onview-subtitle">By subject matter</div>
        <div class="onview-bar-container"><canvas id="bar-subject"></canvas></div>
      </div>
    </div>
  </div>`;
}

function initOnViewCharts(onViewStats) {
  _onViewCharts.forEach(c => c.destroy());
  _onViewCharts = [];
  const medCanvas = document.getElementById('bar-medium');
  const subCanvas = document.getElementById('bar-subject');
  if (!medCanvas || !subCanvas || !onViewStats) return;

  const totalShows = onViewStats.total || 1;

  function makeBar(canvas, rawData) {
    const MAX = 10;
    const sorted = [...rawData].sort((a, b) => b.count - a.count);
    const named  = sorted.slice(0, MAX);
    const otherCount = sorted.slice(MAX).reduce((s, d) => s + d.count, 0);
    const data = otherCount > 0 ? [...named, { label: 'Other', count: otherCount }] : named;

    return new Chart(canvas, {
      type: 'bar',
      data: {
        labels: data.map(d => d.label),
        datasets: [{
          data: data.map(d => d.count),
          backgroundColor: data.map(d => d.label === 'Other' ? OTHER_COLOR : BAR_COLOR),
          borderWidth: 0,
          borderRadius: 2,
        }],
      },
      options: {
        indexAxis: 'y',
        responsive: true,
        maintainAspectRatio: false,
        layout: { padding: { right: 56 } },
        scales: {
          x: { display: false },
          y: {
            grid: { display: false },
            border: { display: false },
            ticks: { font: { size: 10 }, color: '#666', padding: 4 },
          },
        },
        plugins: {
          legend: { display: false },
          tooltip: { enabled: false },
          datalabels: {
            display: true,
            anchor: 'end',
            align: 'end',
            formatter: value => `${value}  ${Math.round(value / totalShows * 100)}%`,
            font: { size: 9.5, weight: '500' },
            color: '#888',
          },
        },
      },
    });
  }

  _onViewCharts.push(makeBar(medCanvas, onViewStats.medium));
  _onViewCharts.push(makeBar(subCanvas, onViewStats.subject));
}

function renderClosing(closing) {
  if (!closing.length) return '';
  const rows = closing.map(c => `
    <div class="closing-row">
      <div class="closing-date">${fmtDate(c.end_date)}</div>
      <div class="closing-info">
        <div class="closing-title">${c.title}</div>
        <div class="closing-venue">${c.venue_name} · ${c.neighborhood}</div>
      </div>
      <div class="closing-seen">${c.seen_count}×</div>
    </div>`).join('');
  return `
  <div class="card card-full card-closing-this">
    <img class="story-logo" src="logo.PNG" alt="Showrunner">
    <div class="card-label">Closing This Month</div>
    <div class="closing-list">${rows}</div>
  </div>`;
}

function renderClosingNext(closing) {
  if (!closing || !closing.length) return '';
  const rows = closing.map(c => `
    <div class="closing-row">
      <div class="closing-date">${fmtDate(c.end_date)}</div>
      <div class="closing-info">
        <div class="closing-title">${c.title}</div>
        <div class="closing-venue">${c.venue_name} · ${c.neighborhood}</div>
      </div>
      <div class="closing-seen">${c.view_count.toLocaleString()}</div>
    </div>`).join('');
  return `
  <div class="card card-full card-closing-next">
    <img class="story-logo" src="logo.PNG" alt="Showrunner">
    <div class="card-label">Closing Next Month</div>
    <div class="closing-list">${rows}</div>
  </div>`;
}

// ── Map helpers ─────────────────────────────────────────────────────────────
function weekBounds(ym, week) {
  const [y, m] = ym.split('-').map(Number);
  const daysInMonth = new Date(y, m, 0).getDate();
  const starts = [1, 8, 15, 22];
  const start = starts[week];
  const end = week === 3 ? daysInMonth : starts[week + 1] - 1;
  return { start, end };
}

function filterByWeek(checkins, ym, week) {
  const { start, end } = weekBounds(ym, week);
  return checkins.filter(c => {
    const day = parseInt(c.timestamp.slice(8, 10), 10);
    return day >= start && day <= end;
  });
}

function toFeatures(checkins) {
  return checkins
    .filter(c => c.lat && c.lon)
    .map(c => {
      const ts = c.timestamp.slice(0, 10); // YYYY-MM-DD
      const [, mo, d] = ts.split('-');
      const dateLabel = `${MONTH_SHORT[mo]} ${parseInt(d)}`;
      return {
        type: 'Feature',
        geometry: { type: 'Point', coordinates: [c.lon, c.lat] },
        properties: {
          show: c.show_title,
          venue: c.venue_name,
          hood: c.neighborhood,
          dateLabel,
        },
      };
    });
}

function buildTooltipHTML(items) {
  const rows = items.map(p =>
    `<div style="padding:4px 0;border-bottom:1px solid #eee;line-height:1.4">
      <strong style="display:block">${p.show}</strong>
      <span style="color:#444">${p.venue}</span>
      <span style="color:#999;float:right">${p.dateLabel}</span>
    </div>`
  ).join('');
  return `<div style="font:12px/1.4 Inter,sans-serif;color:#0A0A0A;max-height:200px;overflow-y:auto;width:220px;padding:2px 4px">${rows}</div>`;
}

// ── Map init ───────────────────────────────────────────────────────────────
function initMap(allCheckins, ym) {
  if (currentMap) { currentMap.remove(); currentMap = null; }

  // Store for view-toggle sync
  window._mapAllCheckins = allCheckins;
  window._mapYm = ym;

  let currentWeek = 0;

  const map = new maplibregl.Map({
    container: 'map-container',
    style: 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',
    center: document.body.classList.contains('story-mode') ? [-73.990, 40.748] : [-73.990, 40.765],
    zoom: document.body.classList.contains('story-mode') ? 11.5 : 10.8,
    attributionControl: false,
  });

  currentMap = map;

  if (document.body.classList.contains('story-mode')) {
    map.scrollZoom.disable();
    map.doubleClickZoom.disable();
    map.touchZoomRotate.disable();
    map.boxZoom.disable();
    map.dragPan.disable();
    map.keyboard.disable();
  }

  // Wire up week buttons
  document.querySelectorAll('.week-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (!map.isStyleLoaded()) return;
      const week = parseInt(btn.dataset.week, 10);
      if (week === currentWeek) return;
      currentWeek = week;
      document.querySelectorAll('.week-btn').forEach(b => b.classList.toggle('active', b === btn));
      switchWeek(week);
    });
  });

  function switchWeek(week) {
    const FADE = 180;
    // Fade out
    map.setPaintProperty('clusters',    'circle-opacity', 0);
    map.setPaintProperty('cluster-count', 'text-opacity', 0);
    map.setPaintProperty('unclustered', 'circle-opacity', 0);
    map.setPaintProperty('unclustered', 'circle-stroke-opacity', 0);
    setTimeout(() => {
      const filtered = filterByWeek(allCheckins, ym, week);
      map.getSource('checkins').setData({ type: 'FeatureCollection', features: toFeatures(filtered) });
      // Fade in
      map.setPaintProperty('clusters',    'circle-opacity', 0.85);
      map.setPaintProperty('cluster-count', 'text-opacity', 1);
      map.setPaintProperty('unclustered', 'circle-opacity', 0.7);
      map.setPaintProperty('unclustered', 'circle-stroke-opacity', 1);
    }, FADE);
  }

  map.on('load', () => {
    const initFeatures = document.body.classList.contains('story-mode')
      ? toFeatures(allCheckins)
      : toFeatures(filterByWeek(allCheckins, ym, 0));

    map.addSource('checkins', {
      type: 'geojson',
      data: { type: 'FeatureCollection', features: initFeatures },
      cluster: true,
      clusterMaxZoom: 14,
      clusterRadius: 30,
      generateId: true,
    });

    map.addLayer({
      id: 'clusters',
      type: 'circle',
      source: 'checkins',
      filter: ['has', 'point_count'],
      paint: {
        'circle-color': '#0A0A0A',
        'circle-radius': ['step', ['get', 'point_count'], 12, 10, 18, 30, 24],
        'circle-opacity': ['case', ['boolean', ['feature-state', 'hover'], false], 1, 0.85],
        'circle-opacity-transition': { duration: 180 },
      },
    });

    map.addLayer({
      id: 'cluster-count',
      type: 'symbol',
      source: 'checkins',
      filter: ['has', 'point_count'],
      layout: {
        'text-field': '{point_count_abbreviated}',
        'text-font': ['Open Sans Bold', 'Arial Unicode MS Bold'],
        'text-size': 11,
      },
      paint: {
        'text-color': '#fff',
        'text-opacity': 1,
        'text-opacity-transition': { duration: 180 },
      },
    });

    map.addLayer({
      id: 'unclustered',
      type: 'circle',
      source: 'checkins',
      filter: ['!', ['has', 'point_count']],
      layout: {
        visibility: document.body.classList.contains('story-mode') ? 'none' : 'visible',
      },
      paint: {
        'circle-color': '#0A0A0A',
        'circle-radius': ['case', ['boolean', ['feature-state', 'hover'], false], 7, 5],
        'circle-opacity': ['case', ['boolean', ['feature-state', 'hover'], false], 1, 0.7],
        'circle-opacity-transition': { duration: 180 },
        'circle-stroke-width': 1,
        'circle-stroke-color': '#fff',
        'circle-stroke-opacity': 1,
        'circle-stroke-opacity-transition': { duration: 180 },
      },
    });

    const popup = new maplibregl.Popup({
      closeButton: true,
      closeOnClick: false,
      offset: 12,
      maxWidth: 'none',
    });

    // ── Hover highlight (no tooltip) ──
    let hoveredId = null;
    const setHover = (id, state) => map.setFeatureState({ source: 'checkins', id }, { hover: state });

    ['unclustered', 'clusters'].forEach(layer => {
      map.on('mouseenter', layer, e => {
        map.getCanvas().style.cursor = 'pointer';
        const id = e.features[0].id;
        if (hoveredId !== null && hoveredId !== id) setHover(hoveredId, false);
        hoveredId = id;
        setHover(id, true);
      });
      map.on('mouseleave', layer, () => {
        map.getCanvas().style.cursor = '';
        if (hoveredId !== null) { setHover(hoveredId, false); hoveredId = null; }
      });
    });

    // ── Click to open pinned tooltip ──
    let clickedOnFeature = false;

    map.on('click', 'unclustered', e => {
      clickedOnFeature = true;
      const p = e.features[0].properties;
      popup.setLngLat(e.lngLat).setHTML(buildTooltipHTML([p])).addTo(map);
    });

    map.on('click', 'clusters', e => {
      clickedOnFeature = true;
      const feat = e.features[0];
      const clusterId = feat.properties.cluster_id;
      const count = feat.properties.point_count;
      Promise.resolve(
        map.getSource('checkins').getClusterLeaves(clusterId, count, 0)
      ).then(leaves => {
        const items = leaves.map(l => l.properties);
        popup.setLngLat(e.lngLat).setHTML(buildTooltipHTML(items)).addTo(map);
      }).catch(() => {});
    });

    // Click on empty map closes popup
    map.on('click', () => {
      if (clickedOnFeature) { clickedOnFeature = false; return; }
      popup.remove();
    });
  });
}

// ── Load month ─────────────────────────────────────────────────────────────
async function loadMonth(ym) {
  setActiveBtn(ym);
  const main = document.getElementById('main');
  main.innerHTML = '<div id="loading">Loading…</div>';
  currentMap = null;

  let data;
  try {
    data = await fetch(`/api/monthly/${ym}`).then(r => {
      if (!r.ok) throw new Error(r.status);
      return r.json();
    });
  } catch (e) {
    main.innerHTML = `<div id="loading" style="color:#c0392b">Failed to load ${ym}: ${e.message}</div>`;
    return;
  }

  main.innerHTML = [
    renderStats(data),
    renderSnapshot(data.snapshot, data.label),
    renderSotm(data.show_of_the_month),
    renderTop5Views(data.top_5_views),
    renderTop5(data.top_5_seen),
    renderTop5Saved(data.top_5_saved),
    renderNeighborhoods(data.neighborhoods),
    renderGalleryCrawl(data.gallery_crawl),
    renderMap(),
    renderClosing(data.closing_this_month),
    renderClosingNext(data.closing_next_month),
    renderMediums(data.mediums_stats, data.month),
    renderSubjectMatters(data.subject_matters_stats, data.month),
    renderOnView(data.on_view_stats, data.label),
  ].join('');

  const [yr, mo] = data.month.split('-');
  document.documentElement.style.setProperty('--story-month-label', `"NYC — ${MONTH_FULL[mo]} ${yr}"`);

  initMap(data.map_checkins, data.month);
  initOnViewCharts(data.on_view_stats);
}

// ── View toggle ────────────────────────────────────────────────────────────
const viewToggle = document.getElementById('view-toggle');

function applyView(isStory) {
  document.body.classList.toggle('story-mode', isStory);
  viewToggle.textContent = isStory ? 'Magazine view' : 'Story view';
  viewToggle.classList.toggle('active', isStory);
  if (currentMap) {
    currentMap.resize();
    if (currentMap.isStyleLoaded() && window._mapAllCheckins) {
      const features = isStory
        ? toFeatures(window._mapAllCheckins)
        : toFeatures(filterByWeek(window._mapAllCheckins, window._mapYm, 0));
      currentMap.getSource('checkins').setData({ type: 'FeatureCollection', features });
      currentMap.setLayoutProperty('unclustered', 'visibility', isStory ? 'none' : 'visible');
    }
  }
}

viewToggle.addEventListener('click', () => {
  const isStory = !document.body.classList.contains('story-mode');
  applyView(isStory);
  localStorage.setItem('showrunner-view', isStory ? 'story' : 'magazine');
});

// ── Init ───────────────────────────────────────────────────────────────────
applyView(localStorage.getItem('showrunner-view') !== 'magazine');
loadMonth(MONTHS[MONTHS.length - 1].ym);
</script>
